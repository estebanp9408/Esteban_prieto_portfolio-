<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Esteban Prieto melo" />
    <meta name="description" content="portfolio Esteban Prieto" />
    <meta name="keywords" content="tripleten, portfolio, proyectos, estudiante " />
    <title>Portfolio Esteban Prieto</title>
    <link rel="stylesheet" href="./pages/index.css">
    <link rel="icon" type="image/x-icon" href="./Images/ep_favicon.svg">

</head>
<body>
  <div class="page">
      <header class="header">
          <div class="header-container">
              <h1 class="header-title">Esteban Prieto</h1>
              <p class="header-subtitle">- Web Developer -</p>
          </div>
          <button class="header-menu-toggle" aria-label="Abrir menú">
              <span class="hamburger-line"></span>
              <span class="hamburger-line"></span>
              <span class="hamburger-line"></span>
          </button>
      </header>
      <main class="main">
          <section id="introduction" class="section introduction active">
            <div class="main-photo_container">
                  <img class="main-photo" src="./Images/esteban-prieto_ph.jpg" alt="Main Photo">

              <div class="main-nav">
                <a class="main-nav-link" href="#about-me" data-section="about">About Me</a>
                <a class="main-nav-link" href="#projects" data-section="projects">Projects</a>
                <a class="main-nav-link" href="#contact" data-section="contact">Contact</a>
              </div>
            </div>
          </section>
          <section  class=" section dynamic-section">
           <div class ="section__container">
           </div>
          </section>
          <section class="section project-popup">
              <div class="project-popup-content">
                  <button class="project-popup-close"></button>
                  <h2 class="project-popup-title"></h2>
                  <p class="project-popup-subtitle"></p>
                  <div class="project-popup__image-container">
                    <img class="project-popup-image" src="" alt="Big Image">
                  </div>
                  <div class="project-popup-caption">
                    <h3 class="project-popup__sectiontitle">Descripción</h3>
                    <ul class="project-popup-description"></ul>
                  </div>
                  <div class="project-popup-impact">
                      <h3 class="project-popup__sectiontitle">Impact</h3>
                      <p class="project-popup-impact-text"></p>
                  </div>
                  <div class="project-popup-tecnologies">
                      <h3 class="project-popup__sectiontitle">Tecnologías</h3>
                      <ul class="project-popup-technologies-list"></ul>
                  </div>
                  <div class="project-popup-navigation">
                      <a href="" class="project-popup-page"> Page</a>
                      <a href="" class="project-popup-repository"> Repository</a>
                  </div>
              </div>
          </section>
          <template class="contact__card-template">
           <a class="contact-card-link"href="">
              <div class="contact-card">
                <div class="image-container">
                  <img class="contact-card-icon" src="" alt="" />
                </div>
                <div class="contact-card-content">
                  <p class="contact-card-label"></p>
                  <p class="contact-card-value"></p>
                </div>
              </div>
           </a>
          </template>
       <template id="about-me__template">
          <div class="about-me__container">

            <h2 class="about-me__title"></h2>

            <p class="about-me__description"></p>

            <!-- SKILLS -->
            <div class="about-me__skills">
              <h3>Skills</h3>
              <ul class="about-me__skills-list"></ul>
            </div>

            <!-- LANGUAGES -->
            <div class="about-me__languages">
              <h3>Languages</h3>
              <ul class="about-me__languages-list"></ul>
            </div>

          </div>
        </template>
          <template id="projects__card-template">
            <div class="projects-card__card">
              <img class="projects-card__card-photo" src="" alt="" />
              <div class="projects-card__card-content">
                <p class="projects-card__card-title"></p>
                <p class="projects-card__card-subtitle"></p>
              </div>
            </div>
          </template>
          <template id="back-to-top-template">
            <a href="#introduction" class=" back-button main-nav-link">← Volver</a>
          </template>
          <template id ="section-title-template">
            <h2 class="section-title"></h2>
          </template>
      </main>
      <footer class="footer">
          <p>&copy; Esteban Prieto 2026</p>
      </footer>
  </div>
  <script type="module" src="./scripts/index.js"></script>

</body>
</html>
